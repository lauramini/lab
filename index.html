<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura's Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:     #F1EFE7;
            --fg:     #111110;
            --muted:  #88887E;
            --border: rgba(17, 17, 16, 0.13);

            --yellow: #F2C94C;
            --coral:  #E07B63;
            --sage:   #95BCA8;
            --blue:   #8FAECB;
            --lilac:  #B8A8D0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { cursor: none; scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 400;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 8rem;
            position: relative;
        }

        /* ── Custom cursor ──────────────────────────────── */

        #cursor {
            position: fixed;
            top: 0; left: 0;
            width: 11px;
            height: 11px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            will-change: transform;
            transform: translate(-50%, -50%);
            transition:
                width  0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                height 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.2s ease;
            mix-blend-mode: difference;
        }

        #cursor.expanded { width: 52px; height: 52px; }

        /* ── Page reveal ────────────────────────────────── */

        .reveal {
            opacity: 0;
            transform: translateY(18px);
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Layout ─────────────────────────────────────── */

        .wrap {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 2.5rem;
            position: relative;
            z-index: 2;
        }

        /* ── Hero ───────────────────────────────────────── */

        .hero { padding: 4rem 0 3rem; }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4rem, 10.5vw, 9rem);
            font-weight: 300;
            font-style: italic;
            line-height: 0.88;
            letter-spacing: -0.025em;
            margin-bottom: 2.5rem;
            animation-delay: 0.2s;
            background: var(--bg);
            width: fit-content;
        }

        .hero-title strong {
            font-weight: 600;
            font-style: italic;
        }

        .hero-desc {
            font-size: 1rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.8;
            white-space: nowrap;
            animation-delay: 0.4s;
            background: var(--bg);
            width: fit-content;
        }

        /* ── Projects ───────────────────────────────────── */

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 3rem 0 0;
            animation-delay: 0.5s;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .on-view {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .project-list {
            border-top: 1px solid var(--border);
            margin-bottom: 8rem;
            animation-delay: 0.6s;
            background: var(--bg);
        }

        .project-row {
            position: relative;
            display: grid;
            grid-template-columns: 3.5rem 1fr auto 2.5rem;
            align-items: center;
            gap: 1.5rem;
            padding: 1.6rem 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            transition: color 0.4s ease;
        }

        .project-row::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--fg);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.55s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 0;
        }

        .project-row:hover::before { transform: scaleX(1); }
        .project-row:hover { color: var(--bg); }
        .project-row > * { position: relative; z-index: 1; }

        .row-num {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--muted);
            transition: color 0.4s ease;
            line-height: 1;
            padding-left: 16px;
        }

        .project-row:hover .row-num { color: rgba(241, 239, 231, 0.4); }

        .row-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            font-weight: 600;
            letter-spacing: -0.015em;
            line-height: 1;
        }

        .row-tags { display: flex; gap: 0.45rem; }

        .row-tag {
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 0.22rem 0.65rem;
            border: 1px solid currentColor;
            border-radius: 100px;
            transition: color 0.4s ease, background 0.4s ease;
        }

        .row-tag.t-yellow { color: #7A5E08; background: var(--yellow); border-color: #7A5E08; }
        .row-tag.t-coral  { color: #7A2010; background: var(--coral);  border-color: #7A2010; }
        .row-tag.t-sage   { color: #1E4D34; background: var(--sage);   border-color: #1E4D34; }
        .row-tag.t-blue   { color: #14355A; background: var(--blue);   border-color: #14355A; }
        .row-tag.t-lilac  { color: #3A2060; background: var(--lilac);  border-color: #3A2060; }

        .project-row:hover .row-tag {
            color: rgba(241, 239, 231, 0.65);
            background: transparent;
            border-color: currentColor;
        }

        .row-arrow {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1rem;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .project-row:hover .row-arrow { transform: translate(3px, -3px); }

        /* ── Responsive ─────────────────────────────────── */

        @media (max-width: 600px) {
            .wrap { padding: 0 1.25rem; }
            .hero { padding: 3.5rem 0 3rem; }
            .chip { display: none; }
            .project-row { grid-template-columns: 2.5rem 1fr 2rem; }
            .row-tags { display: none; }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>

    <div class="wrap">
        <section class="hero">
            <h1 class="hero-title reveal">
                Laura's<br><strong>Playground</strong>
            </h1>
            <p class="hero-desc reveal">Here are the things I'm building and experimenting.</p>
        </section>

        <div class="section-head reveal">
            <span class="section-label">Projects</span>
            <span class="on-view">1 work on view</span>
        </div>

        <div class="project-list reveal">

            <a href="designsystem-documentation.html" class="project-row">
                <span class="row-num">01</span>
                <span class="row-title">Design System Documentation</span>
                <div class="row-tags">
                    <span class="row-tag t-yellow">Design</span>
                </div>
                <div class="row-arrow">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                        <path d="M3 12L12 3M12 3H5M12 3V10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Add new project rows here -->

        </div>
    </div>

    <script>
        // ── Confetti physics ───────────────────────────────
        //
        // Random SVG polygons scattered across the page.
        // Cursor push repels nearby shapes; they drift back to origin.

        const PALETTE = ['#F2C94C', '#E07B63', '#95BCA8', '#8FAECB', '#B8A8D0'];
        const PUSH_RADIUS   = 70;
        const PUSH_STRENGTH = 6000;
        const RETURN_SPEED  = 0.009;
        const DAMPING       = 0.82;

        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:1;';
        document.body.appendChild(svg);

        function updateSvgHeight() {
            svg.style.height = document.documentElement.scrollHeight + 'px';
        }

        function makePolygon() {
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            const size = 5 + Math.random() * 6;
            const r = Math.random();
            let pts = [];

            if (r < 0.35) {
                // Irregular quadrilateral — flattened on one axis
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
                    const rad   = size * (0.6 + Math.random() * 0.4) * (i % 2 === 0 ? 1 : 0.5);
                    pts.push([Math.cos(angle) * rad, Math.sin(angle) * rad]);
                }
            } else if (r < 0.65) {
                // Pentagon / hexagon blob
                const n = Math.random() < 0.5 ? 5 : 6;
                for (let i = 0; i < n; i++) {
                    const angle = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const rad   = size * (0.7 + Math.random() * 0.3);
                    pts.push([Math.cos(angle) * rad, Math.sin(angle) * rad]);
                }
            } else {
                // Bandelette — thin strip with slight skew
                const w  = size * (0.7 + Math.random() * 0.7);
                const h  = size * 0.25;
                const sk = (Math.random() - 0.5) * h;
                pts = [[-w, -h + sk], [w, -h - sk], [w, h + sk], [-w, h - sk]];
            }

            poly.setAttribute('points', pts.map(p => p.join(',')).join(' '));
            poly.setAttribute('fill', PALETTE[Math.floor(Math.random() * PALETTE.length)]);
            poly.setAttribute('opacity', (0.55 + Math.random() * 0.45).toFixed(2));
            return poly;
        }

        let confetti = [];
        let mx = -9999, my = -9999;

        function initConfetti() {
            updateSvgHeight();
            const W = window.innerWidth;
            const H = document.documentElement.scrollHeight;
            const count = Math.floor(W * H / 1500);
            confetti.forEach(c => svg.removeChild(c.el));
            confetti = [];
            for (let i = 0; i < count; i++) {
                const el  = makePolygon();
                svg.appendChild(el);
                const x   = Math.random() * W;
                const y   = Math.random() * H;
                const rot = Math.random() * 360;
                confetti.push({ el, ox: x, oy: y, x, y, vx: 0, vy: 0, rot, vrot: 0 });
                el.setAttribute('transform', `translate(${x},${y}) rotate(${rot})`);
            }
        }

        initConfetti();
        window.addEventListener('resize', initConfetti);

        (function confettiLoop() {
            const docMy = my + window.scrollY;
            confetti.forEach(c => {
                const dx   = c.x - mx;
                const dy   = c.y - docMy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < PUSH_RADIUS && dist > 0.5) {
                    const force = PUSH_STRENGTH / (dist * dist);
                    c.vx += (dx / dist) * force;
                    c.vy += (dy / dist) * force;
                }

                c.vx += (c.ox - c.x) * RETURN_SPEED;
                c.vy += (c.oy - c.y) * RETURN_SPEED;
                c.vx *= DAMPING;
                c.vy *= DAMPING;
                c.x  += c.vx;
                c.y  += c.vy;

                const speed = Math.sqrt(c.vx * c.vx + c.vy * c.vy);
                c.vrot = c.vrot * DAMPING + speed * 0.3;
                c.rot += c.vrot;

                c.el.setAttribute('transform', `translate(${c.x},${c.y}) rotate(${c.rot})`);
            });
            requestAnimationFrame(confettiLoop);
        })();

        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

        // ── Custom cursor ──────────────────────────────────
        const cursor = document.getElementById('cursor');

        document.addEventListener('mousemove', e => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
        });
        document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });
        document.addEventListener('mouseenter', () => { cursor.style.opacity = '1'; });

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('expanded'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('expanded'));
        });

        // ── Project count ──────────────────────────────────
        const rowCount = document.querySelectorAll('.project-row').length;
        const label = document.querySelector('.on-view');
        if (label) label.textContent = rowCount === 1 ? '1 work on view' : `${rowCount} works on view`;
    </script>
</body>
</html>
